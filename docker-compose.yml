services:
  db:
    container_name: postgres
    image: postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /data/postgres
      POSTGRES_DB: nacl_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5443:5432"
    networks:
      - nacl_ntwk

  nacl:
    build:
      context: .
      dockerfile: Dockerfile
    ports: 
      - "3333:3333"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/nacl_dev?sslmode=disable"
      SALT_PORT: "3333"
      JWT_SECRET: "change-me-to-a-secret"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nacl_ntwk

networks:
  nacl_ntwk: {}

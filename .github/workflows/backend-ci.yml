name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'nacl_backend/**'

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: nacl_backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: nacl_backend

  test:
    runs-on: ubuntu-latest
    needs: [golangci]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nacl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        volumes:
          - postgres_data:/var/lib/postgresql
    
    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/nacl_test?sslmode=disable
      JWT_SECRET: test-secret-key-ci
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: nacl_backend/go.sum
      
      - name: Download dependencies
        run: |
          cd nacl_backend
          go mod download
      
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
      
      - name: Apply go fixes
        run: |
          cd nacl_backend
          go fix ./...
      
      - name: Check formatting
        run: |
          cd nacl_backend
          if [ -n "$(gofmt -l .)" ]; then
            echo "Unformatted files found:"
            gofmt -l .
            exit 1
          fi
      
      - name: Run migrations
        run: |
          cd nacl_backend
          goose postgres "$DATABASE_URL_TEST" -dir sql/migrations up
      
      - name: Generate sqlc code
        run: |
          cd nacl_backend
          sqlc generate
      
      - name: Build
        run: |
          cd nacl_backend
          go build -o bin/nacl_backend .
      
      - name: Run tests
        run: |
          cd nacl_backend
          go test -v -race ./...

name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'nacl_frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'nacl_frontend/**'

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nacl_frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd nacl_frontend
          npm ci
      
      - name: Run ESLint
        run: |
          cd nacl_frontend
          npm run lint

  type-check:
    name: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nacl_frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd nacl_frontend
          npm ci
      
      - name: Run TypeScript
        run: |
          cd nacl_frontend
          npx tsc --noEmit

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nacl_frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd nacl_frontend
          npm ci
      
      - name: Run tests
        run: |
          cd nacl_frontend
          npm test -- --run
  
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nacl_frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd nacl_frontend
          npm ci
      
      - name: Build
        run: |
          cd nacl_frontend
          npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nacl_frontend-build
          path: nacl_frontend/dist/
          retention-days: 7

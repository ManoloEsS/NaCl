name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nacl_frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd nacl_frontend
          npm ci
      
      - name: Run ESLint
        run: |
          cd nacl_frontend
          npm run lint

  type-check:
    name: Type Check Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nacl_frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd nacl_frontend
          npm ci
      
      - name: Run TypeScript
        run: |
          cd nacl_frontend
          npx tsc --noEmit

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nacl_frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd nacl_frontend
          npm ci
      
      - name: Build
        run: |
          cd nacl_frontend
          npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nacl_frontend-build
          path: nacl_frontend/dist/
          retention-days: 7
